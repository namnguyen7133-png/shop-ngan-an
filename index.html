<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>HỆ THỐNG SHOP</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#fb5531;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.shop-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:15px;
}

.shop{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
border:1px solid #ddd;
}

.shop:hover{
border-color:#fb5531;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:10px;
text-align:center;
}

.price{
color:#ee4d2d;
font-weight:bold;
}

.buy{
display:block;
background:#fb5531;
color:white;
padding:8px;
margin-top:8px;
text-decoration:none;
border-radius:5px;
}

.back{
display:inline-block;
margin-bottom:15px;
color:#fb5531;
cursor:pointer;
}

</style>
</head>

<body>

<header id="title">HỆ THỐNG 32 SHOP</header>

<div class="container">

<div id="content"></div>

</div>

<script>

const SHEET_ID="1_Xwvp767BMtRnqA-9lF3ROOSbBIBk1k_QwvE2CT-h5s"

const SHOPS=[
{name:"Ngân An",gid:"0"},
{name:"Minh Châu",gid:"2042428163"},
{name:"Bích Ngọc",gid:"2009289883"},
{name:"Gia Bách",gid:"793885535"},
{name:"Ngô Gialinh",gid:"2040744619"},
{name:"Minh Phương",gid:"1363743009"},
{name:"Anh Dũng",gid:"87027625"},
{name:"Hải Vinh",gid:"1113281647"}
]

const params=new URLSearchParams(location.search)
const shop=params.get("shop")

if(!shop){
showShops()
}else{
showProducts(shop)
}

function showShops(){

let html='<div class="shop-grid">'

SHOPS.forEach(s=>{

html+=`
<div class="shop" onclick="openShop('${s.name}')">
${s.name}
</div>
`

})

html+='</div>'

document.getElementById("content").innerHTML=html

}

function openShop(name){

location="?shop="+encodeURIComponent(name)

}

async function showProducts(name){

document.getElementById("title").innerHTML=name

const shop=SHOPS.find(s=>s.name==name)

const url=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${shop.gid}`

const res=await fetch(url)

const data=await res.text()

const rows=data.split("\n")

let html='<div class="back" onclick="location.href=\'./\'">⬅ Quay lại</div>'

html+='<div class="products">'

for(let i=2;i<rows.length;i++){

let row=rows[i].split(",")

let name=row[0]
let img=row[1]
let price=row[2]
let link=row[3]
let stock=row[4]

if(name && stock=="1"){

html+=`
<div class="card">

<img src="${img}">

<div class="info">

<div>${name}</div>

<div class="price">${price} đ</div>

<a class="buy" target="_blank" href="${link}">
MUA NGAY
</a>

</div>

</div>
`

}

}

html+='</div>'

document.getElementById("content").innerHTML=html

}

</script>

</body>
</html>
